# Nihar Mahesh Jani — niharmaheshjani@gmail.com
#
# Central configuration for the entire pipeline.
# Every Python downloader and the C++ engine reads from this one file.
# Change a ticker list or date range here and everything picks it up automatically.

global:
  # Date range for all exchanges. yfinance will give us whatever is available
  # within this window — some stocks won't have data going back to 2000,
  # and that's fine. We take what's there.
  start_date:  "2000-01-01"
  end_date:    "2025-12-31"

  # Where the CSVs live. Python writes here, C++ reads from here directly.
  # No intermediate staging layer.
  stock_root:  "stock_exchange"

  # Where the JSON results go after processing.
  result_root: "result"

  # Logs directory. Each exchange gets its own download log,
  # and each C++ process gets its own engine log.
  log_dir:     "logs"

  # Path to the compiled C++ binary. run.sh sets this to an absolute path
  # after compilation so orchestrate.py can always find it.
  cpp_binary:  "./engine"

  # How many times to retry a failed download before giving up on a ticker.
  retry_count: 3

  # Seconds to wait between retry attempts. First retry waits 1s,
  # second waits 2s, third waits 4s (exponential backoff in base.py).
  retry_delay: 1.0

  # Reject a stock if it has fewer than this many trading days available.
  # 20 is conservative — most liquid stocks have 25+ years of data.
  min_rows:    20

  # Seconds between yfinance requests within the thread pool.
  # 0.15 divided across 12 threads gives reasonable throughput without
  # triggering Yahoo's rate limiting.
  rate_limit:  0.15

  # Concurrent download threads per exchange process.
  # 12 is the sweet spot — faster than this and yfinance starts getting 429s.
  download_threads: 16

# Exchange definitions. Each one has a full name (for logging) and a ticker list.
# Tickers use semicolons within a YAML string so we can pack multiple on one line
# without a massive YAML list. base.py splits them back out.
#
# A note on ticker symbols: these are Yahoo Finance symbols.
# LSE stocks use the .L suffix, JPX uses .T, NSE uses .NS, and so on.
# If a ticker has been delisted or changed symbol, yfinance will fail silently
# and the stock just won't appear in the output. That's expected behaviour.
